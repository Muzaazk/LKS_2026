<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOMSKUY</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="box">
      <div id="splashscreen" class="flex">
        <div class="box">
          <div class="logo">
            <img src="./assets/logo.png" alt="" />
          </div>
          <div class="form_splashscreen">
            <input type="text" id="inputname" />
            <select name="" id="">
              <option value="" name="level">SELECT LEVEL</option>
              <option value="easy" name="level">EASY</option>
              <option value="medium" name="level">MEDIUM</option>
              <option value="hard" name="level">HARD</option>
            </select>
            <button class="btn" id="playBtn">PLAY</button>
            <button class="btn">INSTRUCTION</button>
          </div>
        </div>
      </div>
      <div class="instruction hidden">
        <ul>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
          <li>tesss</li>
        </ul>
      </div>

      <div id="gameBox" class="hidden">
        <div id="main_game" class="hidden">
          <img src="./assets/background.jpg" id="background" />
        </div>

        <div class="statistic"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
