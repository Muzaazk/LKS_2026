<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>TIC TAC TOE</h1>
      <h3 id="currentTurn">current turn : X</h3>
      <div class="game-board">
        <div class="cel" onclick="onClick(0)"></div>
        <div class="cel" onclick="onClick(1)"></div>
        <div class="cel" onclick="onClick(2)"></div>
        <div class="cel" onclick="onClick(3)"></div>
        <div class="cel" onclick="onClick(4)"></div>
        <div class="cel" onclick="onClick(5)"></div>
        <div class="cel" onclick="onClick(6)"></div>
        <div class="cel" onclick="onClick(7)"></div>
        <div class="cel" onclick="onClick(8)"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
