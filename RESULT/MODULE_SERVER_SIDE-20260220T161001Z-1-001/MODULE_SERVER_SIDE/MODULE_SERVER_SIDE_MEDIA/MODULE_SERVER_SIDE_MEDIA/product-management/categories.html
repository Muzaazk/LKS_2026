<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Category</title>

    <!-- Bootstrap -->
    <link href="./css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #eef3fa;
            border-right: 1px solid #ddd;
        }
        .sidebar .nav-link {
            color: #333;
            font-weight: 500;
        }
        .sidebar .nav-link.active {
            background-color: #ccdaf0;
            color: #0d6efd;
            border-radius: 5px;
        }
        .sidebar .nav-link:hover {
            background-color: #e7f1ff;
        }
        .content {
            margin-left: 240px;
            padding: 20px;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar p-3">
    <h4 class="text-primary fw-bold mb-4">Product Management</h4>
    <ul class="nav flex-column">
        <li class="nav-item mb-2">
            <a class="nav-link" href="dashboard.html">Dashboard</a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link active" href="categories.html">Categories</a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link" href="products.html">Products</a>
        </li>
        <li class="nav-item mb-2">
            <a class="nav-link" href="transactions.html">Transactions</a>
        </li>
        <li class="nav-item mt-4">
            <a class="nav-link text-danger" href="login.html">Logout</a>
        </li>
    </ul>
</div>

<!-- Content -->
<div class="content">
<h3>Category</h3>

<div class="card shadow-sm mb-3">
    <div class="card-body">
        <input type="text" class="form-control mb-2" placeholder="Category Name">
        <input type="text" class="form-control mb-2" placeholder="Description">
        <button class="btn btn-primary btn-sm">Save</button>
    </div>
</div>

<table class="table table-bordered bg-white">
    <thead class="table-light">
        <tr align="center">
            <th>No</th>
            <th>Category</th>
            <th>Description</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td align="center">1</td>
            <td>Electronics</td>
            <td>Description of the category</td>
            <td align="center">
                <button class="btn btn-warning btn-sm">Edit</button>
                <button class="btn btn-danger btn-sm">Delete</button>
            </td>
        </tr>
    </tbody>
</table>

</div>

<!-- Bootstrap JS -->
<script src="./js/bootstrap.bundle.min.js"></script>
</body>
</html>
